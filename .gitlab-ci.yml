stages:
  - lint
  - test
  - build

lint:
  stage: lint
  image: golang:1.24
  script:
    - go vet ./...

test:
  stage: test
  image: golang:1.24
  script:
    - go test ./...

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    IMAGE: ${CI_REGISTRY_IMAGE}
    TAG: ${CI_COMMIT_SHORT_SHA}
  script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - docker build -t ${IMAGE}:${TAG} -t ${IMAGE}:latest .
    - docker push ${IMAGE}:${TAG}
    - docker push ${IMAGE}:latest
  only:
    - main